name: Deploy to GitHub Pages

on:
  # 推送到 main 时自动部署
  push:
    branches: [main]
  # 允许在 Actions 页面手动触发
  workflow_dispatch:

# GITHUB_TOKEN 权限：Pages 部署所需
permissions:
  contents: read
  pages: write
  id-token: write

# 并发控制：同一时间只允许一个部署，新推送会取消进行中的旧部署
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 整个仓库根目录作为静态站点（index.html 直接位于根目录）
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
